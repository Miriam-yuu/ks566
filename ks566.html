<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎盃獎牌獎贈品公司 - 商品瀏覽</title>
    <style>
        /* 基礎樣式重設 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { display: flex; flex-direction: column; min-height: 100vh; color: #333; background-color: #f9f9f9; }
        
        /* 頂部麵包屑導航 */
        .breadcrumb { padding: 15px 30px; background: #fff; border-bottom: 1px solid #eee; font-size: 14px; color: #666; }
        .breadcrumb a { color: #0066cc; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* 主要內容區佈局 */
        .main-container { display: flex; flex: 1; padding: 20px 30px; gap: 30px; }

        /* 左側欄：商品分類 */
        .sidebar { width: 260px; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; height: fit-content; }
        .sidebar h3 { font-size: 18px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #333; }
        .sidebar-toggle { display: none; width: 100%; padding: 12px 16px; margin-bottom: 20px; text-align: left; border: 1px solid #ddd; border-radius: 8px; background: #f6f6f6; color: #333; font-weight: bold; cursor: pointer; }
        .menu-parent { font-weight: bold; margin-top: 15px; font-size: 16px; color: #222; cursor: pointer; position: relative; padding-right: 20px; }
        .menu-parent::after { content: '▾'; position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: #999; font-size: 14px; transition: transform 0.2s; }
        .menu-parent.collapsed::after { content: '▸'; transform: translateY(-50%); }
        .menu-child-list { list-style: none; padding-left: 15px; margin-top: 5px; transition: max-height 0.25s ease, opacity 0.25s ease; overflow: hidden; }
        .menu-child-list.collapsed { max-height: 0; opacity: 0; pointer-events: none; margin-top: 0; }
        .menu-child-list:not(.collapsed) { max-height: 1000px; opacity: 1; }
        .menu-child-list li { margin: 8px 0; }
        .menu-child-list a { color: #555; text-decoration: none; font-size: 14px; font-weight: normal; display: block; transition: 0.2s; }
        .menu-child-list a:hover, .menu-child-list a.active { color: #d4af37; font-weight: bold; }
        .sidebar-collapsed { display: none !important; }

        /* 右側欄：商品主區塊 */
        .content-area { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        /* 右側頂部工具列 (排序) */
        .toolbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 20px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .category-title { font-size: 20px; font-weight: bold; }
        .sort-select { padding: 6px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; outline: none; }

        /* 商品 1:1 網格列表 */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        
        /* 強制 1:1 正方形圖片容器 */
        .img-container { width: 100%; aspect-ratio: 1 / 1; background: #f5f5f5; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        
        .product-info { padding: 15px; }
        .product-name { font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #333; }
        .product-price { font-size: 16px; color: #e4393c; font-weight: bold; }

        /* --- 商品詳情彈窗 (Modal) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; width: 850px; max-width: 90%; padding: 30px; border-radius: 12px; position: relative; display: flex; gap: 30px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #999; }
        .close-btn:hover { color: #333; }

        /* 彈窗左側：大圖 (點擊放大效果) */
        .modal-left { flex: 1; }
        .detail-img-container { width: 100%; aspect-ratio: 1 / 1; border: 1px solid #eee; border-radius: 8px; cursor: zoom-in; overflow: hidden; background: #fff; }
        .detail-img-container img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s; }
        /* 放大狀態樣式 */
        .detail-img-container.zoomed img { transform: scale(1.5); }

        /* 彈窗右側：核心資訊欄 */
        .modal-right { flex: 1.2; display: flex; flex-direction: column; gap: 12px; }
        .detail-name { font-size: 24px; font-weight: bold; color: #111; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .detail-price-box { font-size: 22px; color: #ff0000; font-weight: bold; margin: 5px 0; } /* 價格紅色 */
        .detail-meta { font-size: 14px; color: #666; line-height: 1.8; }
        .detail-meta span { font-weight: bold; color: #333; }
        
        /* 標籤樣式 */
        .tag-box { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .tag { background: #f0f0f0; color: #666; padding: 3px 10px; border-radius: 20px; font-size: 12px; }

        /* 特別標註區塊 */
        .notice-box { margin-top: 15px; background: #fff9f0; border-left: 4px solid #ff9900; padding: 12px; border-radius: 0 8px 8px 0; font-size: 14px; display: flex; flex-direction: column; gap: 6px; }
        .notice-item { display: flex; align-items: center; gap: 6px; color: #d47a00; font-weight: bold; }
        /* 行動版響應式 */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; gap: 20px; padding: 0 10px; }
            .sidebar-toggle { display: block; }
            .sidebar { width: 100%; }
            .content-area { width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; gap: 10px; }
            .sort-select { width: 100%; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }
        @media (max-width: 600px) {
            .product-grid { grid-template-columns: 1fr; }
            .sidebar { padding: 15px; }
            .sidebar-toggle { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="breadcrumb" id="breadcrumb">
        <a href="#">首頁</a> &gt; <a href="#">所有商品</a>
    </div>

    <div class="main-container">
        <button class="sidebar-toggle" id="sidebarToggle" type="button">收起分類</button>
        <aside class="sidebar" id="sidebar"><!-- 由 output.json 動態產生分類 --></aside>

        <main class="content-area">
            <div class="toolbar">
                <div class="category-title" id="category-title">所有商品</div>
                <select class="sort-select" id="sortSelect">
                    <option value="default">預設排序</option>
                    <option value="price-low">價格由低到高</option>
                    <option value="price-high">價格由高到低</option>
                </select>
            </div>

            <div class="product-grid" id="productGrid"><!-- 由 output.json 動態產生商品卡片 --></div>
        </main>
    </div>

    <div class="modal-overlay" id="productModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('productModal').style.display='none'">&times;</span>
            
            <div class="modal-left">
                <div class="detail-img-container" id="zoomContainer" onclick="toggleZoom()">
                    <img id="modalImg" src="" alt="商品大圖">
                </div>
            </div>
            
            <div class="modal-right">
                <div class="detail-name" id="modalName">商品名稱</div>
                <div class="detail-price-box" id="modalPrice">NT$ 0</div> <div class="detail-meta">
                    <div><span>型號：</span><span id="modalModel" style="font-weight:normal; color:#666;">-</span></div>
                    <div><span>編號：</span><span id="modalSku" style="font-weight:normal; color:#666;">-</span></div>
                    <div style="display:flex; align-items:center; gap:5px; margin-top:5px;">
                        <span>標籤：</span>
                        <div class="tag-box" id="modalTags"></div>
                    </div>
                </div>

                <div class="notice-box">
                    <div class="notice-item">
                        <span>✨ 本商品價格含基本客製化排版製作</span>
                    </div>
                    <div class="notice-item">
                        <span>✉️ 大量訂購另有優惠</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Modal open (name, priceText, model, sku, tags, imagePath)
        function openModal(name, priceText, model, sku, tags, imagePath) {
            document.getElementById('modalName').innerText = name || '';
            document.getElementById('modalPrice').innerText = priceText || '';
            document.getElementById('modalModel').innerText = model || '-';
            document.getElementById('modalSku').innerText = sku || '-';

            const tagBox = document.getElementById('modalTags');
            tagBox.innerHTML = '';
            (tags || []).forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = tag;
                tagBox.appendChild(span);
            });

            const container = document.getElementById('zoomContainer');
            container.classList.remove('zoomed');
            container.style.cursor = 'zoom-in';
            document.getElementById('modalImg').src = imagePath || ("https://placehold.co/600x600/e6e6e6/333333?text=" + encodeURIComponent(name || ''));
            document.getElementById('productModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        function toggleZoom() {
            const container = document.getElementById('zoomContainer');
            container.classList.toggle('zoomed');
            container.style.cursor = container.classList.contains('zoomed') ? 'zoom-out' : 'zoom-in';
        }

        // 渲染與資料載入
        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            if (!items || items.length === 0) { grid.innerHTML = '<div style="padding:20px;">沒有商品</div>'; return; }
            items.forEach(item => {
                const card = document.createElement('div'); card.className = 'product-card';
                const imgContainer = document.createElement('div'); imgContainer.className = 'img-container';
                const img = document.createElement('img');
                img.src = item['圖片路徑'] || 'https://placehold.co/400x400/e6e6e6/333333?text=No+Image';
                img.alt = item['名稱'] || '';
                imgContainer.appendChild(img);

                const info = document.createElement('div'); info.className = 'product-info';
                const name = document.createElement('div'); name.className = 'product-name'; name.innerText = item['名稱'] || item['型號'] || '';
                const price = document.createElement('div'); price.className = 'product-price'; price.innerText = item['價格'] ? ('NT$ ' + item['價格']) : '-';
                info.appendChild(name); info.appendChild(price);

                card.appendChild(imgContainer); card.appendChild(info);
                card.addEventListener('click', () => {
                    openModal(item['名稱'], 'NT$ ' + (item['價格']||''), item['型號'], item['編號'], [], item['圖片路徑']);
                });

                grid.appendChild(card);
            });
        }

        // 讀取 output.json 並建立側欄與事件
        fetch('output.json').then(r => r.json()).then(data => {
            window.catalog = data;
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '<h3>商品分類</h3>';

            // 建立 parent -> unique children
            const parents = Object.keys(data || {});
            let firstLink = null;
            parents.forEach(parent => {
                const parentDiv = document.createElement('div'); parentDiv.className = 'menu-parent'; parentDiv.innerText = parent;
                const ul = document.createElement('ul'); ul.className = 'menu-child-list';

                const childSet = new Set((data[parent] || []).map(i => i['小分類'] || '所有商品'));
                // 預設第一項為「所有商品」
                const liAll = document.createElement('li');
                const aAll = document.createElement('a'); aAll.href='#'; aAll.innerText = '所有商品'; aAll.dataset.parent = parent; aAll.dataset.child = '';
                liAll.appendChild(aAll); ul.appendChild(liAll);
                if (!firstLink) firstLink = aAll;

                Array.from(childSet).forEach(child => {
                    if (!child) return;
                    const li = document.createElement('li'); const a = document.createElement('a'); a.href = '#'; a.innerText = child; a.dataset.parent = parent; a.dataset.child = child;
                    li.appendChild(a); ul.appendChild(li);
                    if (!firstLink) firstLink = a;
                });

                sidebar.appendChild(parentDiv); sidebar.appendChild(ul);
            });

            // 事件：子分類點擊
            sidebar.querySelectorAll('.menu-child-list a').forEach(a => {
                a.addEventListener('click', e => {
                    e.preventDefault();
                    sidebar.querySelectorAll('.menu-child-list a').forEach(x => x.classList.remove('active'));
                    a.classList.add('active');
                    const parent = a.dataset.parent; const child = a.dataset.child;
                    document.getElementById('category-title').innerText = a.innerText;
                    document.getElementById('breadcrumb').innerHTML = `<a href="#">首頁</a> &gt; <a href="#">${parent}</a> &gt; ${a.innerText}`;
                    let items = (data[parent] || []).slice();
                    if (child) items = items.filter(it => it['小分類'] === child);
                    // 排序選項
                    const sort = document.getElementById('sortSelect').value;
                    if (sort === 'price-low') items.sort((a,b)=> (a['價格']||0) - (b['價格']||0));
                    if (sort === 'price-high') items.sort((a,b)=> (b['價格']||0) - (a['價格']||0));
                    renderProducts(items);
                });
            });

            // 父分類點擊收合
            sidebar.querySelectorAll('.menu-parent').forEach(parentEl => {
                parentEl.addEventListener('click', () => {
                    const child = parentEl.nextElementSibling; if (!child) return;
                    child.classList.toggle('collapsed'); parentEl.classList.toggle('collapsed');
                });
            });

            // 初始顯示第一個分類的所有商品
            if (firstLink) firstLink.click();

            // 排序改變時重新套用目前分類
            const sortSelect = document.getElementById('sortSelect');
            sortSelect.addEventListener('change', () => {
                const active = sidebar.querySelector('.menu-child-list a.active');
                if (active) active.click(); else if (firstLink) firstLink.click();
            });
        }).catch(err => { console.error('讀取 output.json 錯誤', err); });

        // 側邊欄整體收合（立即綁定）
        (function(){
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            if (!sidebarToggle || !sidebar) return;
            sidebarToggle.addEventListener('click', () => {
                sidebar.classList.toggle('sidebar-collapsed');
                const collapsed = sidebar.classList.contains('sidebar-collapsed');
                sidebarToggle.innerText = collapsed ? '展開分類' : '收起分類';
            });
            if (window.innerWidth <= 900) { sidebar.classList.add('sidebar-collapsed'); sidebarToggle.innerText = '展開分類'; }
        })();
    </script>
</body>
</html>
